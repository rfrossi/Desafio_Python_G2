<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Receitas</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <div class="left">
      <button id="add-recipe">+</button>
      <div id="cards"></div>
    </div>

    <div class="right" id="editor">
      <input type="text" id="title-input">
      <textarea id="ingredients-input" placeholder="Ingredientes"></textarea>
      <textarea id="instructions-input" placeholder="Modo de preparo"></textarea>
      <button id="delete-recipe">Deletar receita</button>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
